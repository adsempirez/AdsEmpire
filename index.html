<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Access</title>

<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#0f2027;
    color:white;
    overflow-x:hidden;
}

/* Animated background */
body::before {
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:linear-gradient(45deg,#00f2ff,#ff00c8,#00ff95);
    animation:rotate 12s linear infinite;
    opacity:0.08;
}
@keyframes rotate {100%{transform:rotate(360deg);}}

/* Container */
.container {
    text-align:center;
    padding:60px 20px;
}

/* Logo */
.logo {
    width:120px;
    border-radius:50%;
    box-shadow:0 0 25px cyan;
    animation:float 3s infinite;
}
@keyframes float {50%{transform:translateY(-10px);}}

/* Heading */
h1 {
    font-size:34px;
    margin-top:20px;
    background:linear-gradient(90deg,#00f2ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* Live counter */
.counter {
    margin-top:15px;
    font-size:18px;
    color:#00ff95;
}

/* Timer */
.timer {
    margin-top:10px;
    font-size:20px;
    color:#ffcc00;
}

/* Buttons row */
.row {
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn {
    padding:12px 22px;
    border-radius:30px;
    cursor:pointer;
    border:none;
    transition:0.3s;
}

/* Buttons colors */
.telegram {background:linear-gradient(45deg,#0088cc,#00f2ff);}
.qr {background:linear-gradient(45deg,#ff00c8,#ff7b00);}
.whatsapp {background:linear-gradient(45deg,#25D366,#00ff95);}

.btn:hover {
    transform:scale(1.1);
    box-shadow:0 0 15px white;
}

/* Price */
.price-card {
    margin-top:50px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

.price {
    font-size:32px;
    color:#00ff95;
}

/* Testimonials */
.testimonials {
    margin-top:60px;
}

.testimonial {
    margin:15px auto;
    max-width:300px;
    padding:15px;
    background:rgba(255,255,255,0.07);
    border-radius:15px;
}

/* Popup QR */
.popup {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.popup img {
    width:320px;
    border-radius:10px;
}

.popup.active {display:flex;}

</style>
</head>

<body>

<div class="container">

<img src="IMG_20260501_230803_508.jpg.jpeg" class="logo">

<h1>Join Premium Telegram</h1>

<div class="counter" id="counter">🔥 127 people joined today</div>
<div class="timer" id="timer">Offer ends in: 05:00</div>

<!-- BUTTONS -->
<div class="row">
    <button class="btn telegram" onclick="tg()">Telegram</button>
    <button class="btn qr" onclick="qr()">QR Code</button>
    <button class="btn whatsapp" onclick="wa()">WhatsApp</button>
</div>

<!-- PRICE -->
<div class="price-card">
    <p>Premium Access</p>
    <div class="price">₹199</div>
</div>

<!-- TESTIMONIALS -->
<div class="testimonials">
    <h2>What Members Say</h2>

    <div class="testimonial">"Bhai paisa vasool 🔥"</div>
    <div class="testimonial">"Signals mast kaam karte hain"</div>
    <div class="testimonial">"Joined today, already profit 😎"</div>
</div>

</div>

<!-- QR POPUP -->
<div class="popup" id="popup" onclick="closeQR()">
    <img src="your-qr.png.png">
</div>

<script>
// Telegram
function tg(){window.open("https://t.me/+PzoZiNRCvN5hMjY1");}

// WhatsApp
function wa(){window.open("https://wa.me/918532911575");}

// QR
function qr(){document.getElementById("popup").classList.add("active");}
function closeQR(){document.getElementById("popup").classList.remove("active");}

// Counter animation
let count = 127;
setInterval(()=>{
    count++;
    document.getElementById("counter").innerText="🔥 "+count+" people joined today";
},3000);

// Timer countdown
let time = 300;
setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time%60;
    document.getElementById("timer").innerText="Offer ends in: "+m+":"+ (s<10?"0"+s:s);
    if(time>0) time--;
},1000);

</script>

</body>
</html>
